steps:
  # Build the Docker image with VITE_API_URL baked in at build time
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'VITE_API_URL=https://the-nest-api-114675580879.australia-southeast1.run.app/api'
      - '-t'
      - 'gcr.io/$PROJECT_ID/the-nest-frontend:latest'
      - '.'

  # Push the image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/the-nest-frontend:latest']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'the-nest-frontend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/the-nest-frontend:latest'
      - '--region'
      - 'australia-southeast1'
      - '--allow-unauthenticated'
      - '--port'
      - '80'

images:
  - 'gcr.io/$PROJECT_ID/the-nest-frontend:latest'
